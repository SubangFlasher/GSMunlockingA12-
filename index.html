    <style>
        :root {
            --neon-red: #ff003c;
            --neon-pink: #ff1493;
            --bg-dark: #050505;
        }

        * {
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Rajdhani', sans-serif;
            background-color: var(--bg-dark);
            color: #fff;
            overflow-x: hidden;
        }

        /* Background GIF Animasi */
        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            /* Link GIF Animasi Cyberpunk */
            background: url('https://i.gifer.com/7A4I.gif') no-repeat center center fixed;
            background-size: cover;
            filter: brightness(0.2) contrast(1.2);
        }

        .container {
            max-width: 700px;
            margin: 40px auto;
            padding: 20px;
            text-align: center;
        }

        /* Header Subang Dev */
        h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 3.5rem;
            color: var(--neon-red);
            text-shadow: 0 0 10px var(--neon-red), 0 0 20px var(--neon-pink);
            margin-bottom: 0;
            letter-spacing: 8px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }

        .subtitle {
            color: var(--neon-pink);
            letter-spacing: 3px;
            margin-bottom: 40px;
            font-weight: bold;
        }

        /* Log Update Box */
        .log-update {
            background: rgba(255, 0, 60, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid var(--neon-red);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 40px;
            box-shadow: 0 0 15px rgba(255, 0, 60, 0.2);
        }

        .log-update h2 {
            margin-top: 0;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            color: #fff;
            border-bottom: 1px solid var(--neon-pink);
            display: inline-block;
            padding-bottom: 5px;
        }

        .log-text {
            text-align: left;
            font-size: 1.1rem;
            line-height: 1.6;
        }

        .status-dot {
            height: 10px;
            width: 10px;
            background-color: #00ff00;
            border-radius: 50%;
            display: inline-block;
            margin-right: 10px;
            box-shadow: 0 0 8px #00ff00;
        }

        /* Tool Card */
        .tool-card {
            background: rgba(20, 20, 20, 0.8);
            border-radius: 20px;
            border: 1px solid var(--neon-pink);
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .tool-image {
            width: 100%;
            max-width: 300px;
            height: 180px;
            background: #1a1a1a; /* Warna cadangan jika gambar tidak ada */
            border-radius: 15px;
            margin-bottom: 20px;
            border: 2px solid var(--neon-red);
            object-fit: cover;
            box-shadow: 0 0 15px var(--neon-red);
        }

        .tool-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: #fff;
        }

        /* Buttons */
        .btn-group {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .btn {
            flex: 1;
            padding: 12px 20px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.9rem;
            display: inline-block;
        }

        .btn-download {
            background: var(--neon-red);
            color: white;
            box-shadow: 0 0 10px var(--neon-red);
        }

        .btn-buy {
            background: transparent;
            border: 2px solid var(--neon-pink);
            color: var(--neon-pink);
        }

        .btn:hover {
            transform: translateY(-3px);
            filter: brightness(1.2);
            box-shadow: 0 0 25px var(--neon-pink);
        }

        footer {
            margin-top: 50px;
            font-size: 0.8rem;
            color: #555;
        }

    </style>
</head>
